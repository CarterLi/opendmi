%YAML 1.1
#
# OpenDMI: Cross-platform DMI/SMBIOS framework
# Copyright (c) 2025-2026, The OpenDMI contributors
#
# SPDX-License-Identifier: BSD-3-Clause
#
---
$schema: "http://json-schema.org/draft-04/schema"
id: "http://opendmi.org/schemas/opendmi.yml"
title: OpenDMI YAML schema

type: object
properties:
    entry:
        type: object
        properties:
            smbios-version:
                ref: "#/$definitions/versionNumber"
                description: SMBIOS version number
            table-area-address:
                type: integer
                minimum: 0
            table-area-size:
                type: integer
                minimum: 0
        required:
          - smbios-version

    entities:
        type: array
        items:
            type: object
            properties:
                handle:
                    ref: "#/$definitions/entityHandle"
                type:
                    ref: "#/$definitions/entityType"
                length:
                    ref: "#/$definitions/entityLength"
                level:
                    ref: "#/$definitions/versionNumber"
                description:
                    type: string
                data:
                    type: string
                    tag: binary
                strings:
                    type: array
                    items:
                        type: object
                        properties:
                            index:
                                type: integer
                                minimum: 0
                                maximum: 255
                            value:
                                type: string
                attributes:
                    type: object
            required:
              - handle
              - type
              - length

    types:
        type: array
        items:
            type: object
            properties:
                id:
                    type: integer
                    minimum: 0
                    maximum: 255
                code:
                    type: string
                name:
                    type: string
            required:
              - id
              - code
              - name

required:
- entry

$definitions:
    entityHandle:
        descripton: Entity handle value
        type: integer
        minimum: 0x0000
        maximum: 0xFFFE
    entityType:
        description: Entity type value
        type: integer
        minimum: 0
        maximum: 255
    entityLength:
        description: Entity length value
        type: integer
        minimum: 0
        maximum: 255
    versionNumber:
        description: Version number
        type: string
        pattern: ^[0-9]+\.[0-9]+(\.[0-9]+)?$
